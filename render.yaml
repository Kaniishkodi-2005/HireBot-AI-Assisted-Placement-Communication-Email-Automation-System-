services:
  # Backend API Service
  - type: web
    name: hirebot-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: IMAP_HOST
        value: imap.gmail.com
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: USE_SQLITE
        value: true

  # Frontend Service
  - type: static
    name: hirebot-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://hirebot-backend.onrender.com/api/v1
